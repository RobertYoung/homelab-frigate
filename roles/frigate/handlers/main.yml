---
- name: "Restart {{ frigate_service_name }}"
  become: true
  ansible.builtin.systemd:
    name: "{{ frigate_service_name }}"
    state: restarted
    daemon_reload: true
    enabled: true

- name: Reboot for NVIDIA driver
  become: true
  ansible.builtin.reboot:
    msg: "Rebooting to load NVIDIA driver"
    connect_timeout: 5
    reboot_timeout: 600
    pre_reboot_delay: 0
    post_reboot_delay: 30
